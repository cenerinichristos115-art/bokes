<p class="detail-intro">该模板聚焦“本地可跑通”与“依赖最少”，默认提供文档导入、切分、向量化、检索与问答五个基础模块，适合作为内部知识库原型的起点。</p>
<section>
<h2 id="section-1">可替换设计</h2>
<p>项目结构按职责拆分，便于替换组件：你可以独立更换嵌入模型、向量数据库或重排策略，而不需要重写整条链路。</p>
</section>
<section>
<h2 id="section-2">落地建议</h2>
<p>维护者建议先用小规模文档验证召回质量，再逐步扩大数据量并加入监控指标，这样能更快定位性能瓶颈和答案偏差。</p>
</section>
