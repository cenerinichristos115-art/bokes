name: Auto Publish AI Content

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-publish-ai-news
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  AUTO_NEWS_COUNT: "2"
  AUTO_GUIDE_COUNT: "1"
  AUTO_OPEN_SOURCE_COUNT: "2"
  AUTO_NEWS_TIMEZONE: Asia/Shanghai

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Preflight checks
        id: preflight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY 未配置，跳过自动生成。"
            echo "skip_generate=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_generate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate daily AI content (2 news + 1 guide + 2 open-source)
        id: generate
        if: steps.preflight.outputs.skip_generate != 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          status=0
          node scripts/auto-generate-daily-ai-news.js || status=1
          AUTO_TARGET_SECTION=ai-guide AUTO_TARGET_CATEGORY="AI使用教程" AUTO_TARGET_PREFIX=ai-guide AUTO_NEWS_COUNT="${AUTO_GUIDE_COUNT}" node scripts/auto-generate-daily-ai-news.js || status=1
          AUTO_TARGET_SECTION=open-source AUTO_TARGET_CATEGORY="开源项目" AUTO_TARGET_PREFIX=open-source AUTO_NEWS_COUNT="${AUTO_OPEN_SOURCE_COUNT}" node scripts/auto-generate-daily-ai-news.js || status=1
          exit "$status"

      - name: Report skipped generation
        if: steps.preflight.outputs.skip_generate == 'true'
        run: echo "::notice::自动生成已跳过，后续仅重建静态页面。"

      - name: Report generation failure
        if: steps.generate.outcome == 'failure'
        run: echo "::warning::自动生成失败，已跳过当天自动发布。"

      - name: Rebuild static pages
        run: node scripts/generate-static.js

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js articles sections sitemap.xml robots.txt
          git commit -m "Auto publish 2 news, 1 guide, 2 open-source for $(date +%F)"
          BRANCH="${GITHUB_REF_NAME:-master}"
          for attempt in 1 2 3; do
            if ! git pull --rebase origin "$BRANCH"; then
              echo "Rebase failed on attempt $attempt, abort and retry..."
              git rebase --abort || true
              continue
            fi
            if git push origin "HEAD:$BRANCH"; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt, retrying..."
          done
          echo "::error::Failed to push after 3 attempts."
          exit 1
