name: Auto Publish AI News

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-publish-ai-news
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  AUTO_NEWS_COUNT: "3"
  AUTO_NEWS_TIMEZONE: Asia/Shanghai

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Preflight checks
        id: preflight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY 未配置，跳过自动生成。"
            echo "skip_generate=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_generate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate 3 daily AI news posts
        id: generate
        if: steps.preflight.outputs.skip_generate != 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: node scripts/auto-generate-daily-ai-news.js

      - name: Report skipped generation
        if: steps.preflight.outputs.skip_generate == 'true'
        run: echo "::notice::自动生成已跳过，后续仅重建静态页面。"

      - name: Report generation failure
        if: steps.generate.outcome == 'failure'
        run: echo "::warning::自动生成失败，已跳过当天自动发布。"

      - name: Rebuild static pages
        run: node scripts/generate-static.js

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js articles sections sitemap.xml robots.txt
          git commit -m "Auto publish 3 AI news for $(date +%F)"
          git push
